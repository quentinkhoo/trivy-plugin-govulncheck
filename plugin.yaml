name: govulncheck
repository: github.com/quentinkhoo/trivy-plugin-govulncheck
version: "0.1.1"
usage: trivy govulncheck image <ref>
description: |-
  Integrate Govulncheck into your Trivy Scan, removing false positives detected by Govulncheck.
platforms:
  - selector:
      os: darwin
      arch: amd64
    uri: https://github.com/quentinkhoo/trivy-plugin-govulncheck/releases/download/v0.1.1/trivy-plugin-govulncheck_0.1.1_darwin-amd64.tar.gz
    bin: ./trivy-plugin-govulncheck
  - selector:
      os: darwin
      arch: arm64
    uri: https://github.com/quentinkhoo/trivy-plugin-govulncheck/releases/download/v0.1.1/trivy-plugin-govulncheck_0.1.1_darwin-arm64.tar.gz
    bin: ./trivy-plugin-govulncheck
  - selector:
      os: linux
      arch: amd64
    uri: https://github.com/quentinkhoo/trivy-plugin-govulncheck/releases/download/v0.1.1/trivy-plugin-govulncheck_0.1.1_linux-amd64.tar.gz
    bin: ./trivy-plugin-govulncheck
  - selector:
      os: linux
      arch: arm64
    uri: https://github.com/quentinkhoo/trivy-plugin-govulncheck/releases/download/v0.1.1/trivy-plugin-govulncheck_0.1.1_linux-arm64.tar.gz
    bin: ./trivy-plugin-govulncheck